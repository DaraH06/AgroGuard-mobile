name: agrouardmobile
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  google_nav_bar: ^5.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: "^0.13.1"
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/agro1.png"
  min_sdk_android: 21

flutter_native_splash:
  image: "assets/icon/agro1.png"
  color: "#FFFFFF"
  android_gravity: center
  fullscreen: true

flutter:
  uses-material-design: true
