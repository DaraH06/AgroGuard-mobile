name: agrouardmobile
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/ikon-agro.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF" # Ganti warna sesuai keinginan
  adaptive_icon_foreground: "assets/icons/app_icon.png"
